<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoutineAI Pro Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --p: #6366f1; --s: #10b981; --w: #f59e0b; --d: #ef4444;
            --bg: #0f172a; --c: #1e293b; --t: #f8fafc; --mt: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .app { width: 100%; max-width: 480px; display: none; animation: slideIn 0.4s ease; }
        #auth-screen { width: 100%; max-width: 400px; text-align: center; margin-top: 5vh; }
        
        .card { background: var(--c); padding: 25px; border-radius: 24px; margin-bottom: 15px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .alert { background: rgba(239, 68, 68, 0.15); border-left: 6px solid var(--d); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: none; animation: slideIn 0.3s ease; }
        
        input, select { padding: 16px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; width: 100%; margin-bottom: 12px; font-size: 1rem; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-act { padding: 8px 16px; margin: 8px 8px 0 0; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--c); padding: 6px; border-radius: 16px; position: sticky; top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; background: none; color: var(--mt); border: none; cursor: pointer; font-weight: 700; }
        .tab.active { background: var(--p); color: white; }

        .task { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.02); transition: 0.3s; cursor: pointer; }
        .task.done { opacity: 0.4; transform: scale(0.98); }
        .task.ignored { border-left: 4px solid var(--mt); opacity: 0.6; }
        .task.drain-high { border-right: 4px solid var(--d); }
        .task.drain-med { border-right: 4px solid var(--w); }
        .task.drain-low { border-right: 4px solid var(--s); }

        .check { width: 28px; height: 28px; border: 2.5px solid var(--p); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check.checked { background: var(--s); border-color: var(--s); }
        .check.checked::after { content: '✓'; color: white; font-weight: bold; }

        .prog-bg { background: #334155; height: 12px; border-radius: 6px; flex: 1; overflow: hidden; margin: 10px 0; }
        .prog-fill { height: 100%; background: var(--s); width: 0%; transition: 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        /* Dias da Semana Selector */
        .days-selector { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 4px; }
        .day-btn { flex: 1; padding: 8px 0; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: var(--mt); font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        .day-btn.active { background: var(--p); color: white; border-color: var(--p); }

        #energyModal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2, 6, 23, 0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .energy-option { padding: 20px; border-radius: 15px; background: var(--c); text-align: center; cursor: pointer; border: 2px solid transparent; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h2>RoutineAI Pro Sync ☁️</h2>
        <input type="email" id="u-email" placeholder="E-mail">
        <input type="password" id="u-token" placeholder="GitHub Token (PAT)">
        <button class="btn btn-p" onclick="Cloud.login()">Entrar e Sincronizar</button>
    </div>
</div>

<div id="energyModal">
    <div class="card" style="text-align:center; width:100%">
        <h2>Bom dia! ⚡</h2>
        <p>Como está sua bateria hoje?</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:20px">
            <div class="energy-option" onclick="API.setDailyEnergy(1)">🔋<br>Baixa</div>
            <div class="energy-option" onclick="API.setDailyEnergy(3)">⚡<br>Média</div>
            <div class="energy-option" onclick="API.setDailyEnergy(5)">🔥<br>Alta</div>
        </div>
    </div>
</div>

<div class="app" id="main-app">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
        <button class="btn" style="background: rgba(255,255,255,0.1); color: var(--mt); padding: 5px 12px; font-size: 0.75rem;" onclick="Cloud.logout()">Sair da Conta</button>
    </div>

    <div id="delayBox" class="alert">
        <span style="display:block; font-weight:700;">🚀 Hora de agir: <span id="delayTask"></span></span>
        <div style="display: flex; gap: 8px;">
            <button class="btn btn-act" style="background:var(--p); color:white" onclick="API.rescheduleAll()">Adiar 15min</button>
            <button class="btn btn-act" style="background:var(--w); color:white" onclick="API.skip()">Pular esta</button>
        </div>
    </div>

    <div class="tabs">
        <button id="t-h" class="tab active" onclick="UI.tab('h')">Hoje</button>
        <button id="t-c" class="tab" onclick="UI.tab('c')">Plano</button>
        <button id="t-a" class="tab" onclick="UI.tab('a')">Analytics</button>
    </div>

    <div id="v-h">
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:0.8rem; color:var(--mt)">
                <span>PROGRESSO</span><span id="p-txt">0%</span>
            </div>
            <div class="prog-bg"><div id="p-bar" class="prog-fill"></div></div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="v-c" style="display:none">
        <div class="card">
            <input type="hidden" id="f-id">
            <h3 id="form-title" style="margin-top:0">Novo Hábito</h3>
            <input type="text" id="f-n" placeholder="Atividade...">
            
          <div style="display:flex; gap:10px">
    <input type="text" id="f-s" oninput="UI.maskTime(this)" maxlength="5" placeholder="00:00">
<input type="text" id="f-e" oninput="UI.maskTime(this)" maxlength="5" placeholder="00:00">
</div>

            <div class="days-selector" id="f-days">
                <button class="day-btn active" data-day="1" onclick="this.classList.toggle('active')">S</button>
                <button class="day-btn active" data-day="2" onclick="this.classList.toggle('active')">T</button>
                <button class="day-btn active" data-day="3" onclick="this.classList.toggle('active')">Q</button>
                <button class="day-btn active" data-day="4" onclick="this.classList.toggle('active')">Q</button>
                <button class="day-btn active" data-day="5" onclick="this.classList.toggle('active')">S</button>
                <button class="day-btn active" data-day="6" onclick="this.classList.toggle('active')">S</button>
                <button class="day-btn active" data-day="0" onclick="this.classList.toggle('active')">D</button>
            </div>

            <select id="f-k">
                <option value="Trabalho">💻 Trabalho</option>
                <option value="Saúde">💪 Saúde</option>
                <option value="Lazer">🎮 Lazer</option>
                <option value="Essencial">☕ Essencial</option>
            </select>
            <select id="f-d">
                <option value="low">🍃 Baixa Energia</option>
                <option value="med" selected>⚡ Média Energia</option>
                <option value="high">🔥 Alta Energia</option>
            </select>
            
            <button id="btn-main" class="btn btn-p" onclick="API.add()">Adicionar ao Plano</button>
            <button id="btn-cancel" class="btn" style="width:100%; margin-top:8px; display:none; background:transparent; color:var(--mt)" onclick="UI.resetForm()">Cancelar Edição</button>
        </div>
    </div>

    <div id="v-a" style="display:none">
        <div class="card">
            <h4 style="margin:0">Onde está seu tempo? (Min)</h4>
            <div style="height:220px"><canvas id="c-p"></canvas></div>
        </div>
        <div class="card">
            <h4 style="margin:0">Carga por Categoria</h4>
            <div style="height:220px"><canvas id="c-b"></canvas></div>
        </div>
    </div>
</div>

<script>
const Cloud = {
    owner: "jirineu",
    cred: JSON.parse(localStorage.getItem('ri_auth')),
    
    logout() {
        if(confirm("Deseja realmente sair? Deve se Lembrar do E-mail e Token para entrar novamente.")) {
            localStorage.clear();
            location.reload();
        }
    },
    async login() {
        const email = document.getElementById('u-email').value.trim();
        const token = document.getElementById('u-token').value.trim();
        
        if(!email || !token) return alert('E-mail e Token são obrigatórios!');
        
        localStorage.clear();
        if(typeof API !== 'undefined') API.db = [];
        
        this.cred = { 
            user: this.owner, 
            token: token, 
            file: `data_${btoa(email).substring(0,8)}.json` 
        };
        
        localStorage.setItem('ri_auth', JSON.stringify(this.cred));
        
        try {
            const res = await fetch(`https://api.github.com/repos/${this.owner}/routine-db`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(res.ok || res.status === 404) { 
                location.reload(); 
            } else {
                alert("Token inválido ou sem acesso ao repositório.");
            }
        } catch(e) {
            alert("Erro de conexão com o GitHub.");
        }
    },

    async request(method, body = null) {
        if(!this.cred) return method === 'GET' ? [] : null;
        const url = `https://api.github.com/repos/${this.cred.user}/routine-db/contents/${this.cred.file}`;
        const headers = { 
            'Authorization': `token ${this.cred.token}`, 
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };

        try {
            const res = await fetch(url, { headers });
            let currentSha = null;
            
            if (res.ok) {
                const data = await res.json();
                currentSha = data.sha;
                if (method === 'GET') {
                    return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } else if (res.status === 404 && method === 'GET') {
                return []; 
            }

            if (method === 'PUT' && body) {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(body))));
                const putData = { message: 'Sync RoutineAI', content };
                if (currentSha) putData.sha = currentSha;

                const putRes = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(putData) });
                if (putRes.ok) console.log("☁️ Sincronizado");
            }
        } catch(e) { }
        return method === 'GET' ? [] : null;
    }
};

const API = {
    db: JSON.parse(localStorage.getItem('ri_pro_db') || '[]'),

    async init() {
        if(!Cloud.cred) return;
        const checkDOM = setInterval(() => {
            if(document.getElementById('main-app')) {
                clearInterval(checkDOM);
                this.setupApp();
            }
        }, 100);
    },

    async setupApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        UI.render();
        
        const remote = await Cloud.request('GET');
        if (remote && Array.isArray(remote)) {
            this.db = remote;
            localStorage.setItem('ri_pro_db', JSON.stringify(this.db));
            UI.render();
        }
        
        if(!localStorage.getItem('ri_energy_today')) {
            const modal = document.getElementById('energyModal');
            if(modal) modal.style.display = 'flex';
        }
        this.loop();
    },

    async sync() {
        localStorage.setItem('ri_pro_db', JSON.stringify(this.db));
        UI.render();
        await Cloud.request('PUT', this.db);
    },

add() {
    const idField = document.getElementById('f-id');
    const id = idField ? idField.value : "";
    
    const n = document.getElementById('f-n').value, 
          s = document.getElementById('f-s').value, 
          e = document.getElementById('f-e').value;
    
    const days = [...document.querySelectorAll('#f-days .day-btn.active')].map(b => parseInt(b.dataset.day));
    
    // Validação de formato HH:MM (essencial agora que o input é texto)
    const timeRegex = /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/;
    if(!n || !timeRegex.test(s) || !timeRegex.test(e) || days.length === 0) {
        return alert("Preencha Nome, Horários válidos (ex: 08:00) e escolha os Dias!");
    }

    const taskData = { 
        id: id ? parseInt(id) : Date.now(), 
        name: n, 
        start: s, 
        end: e, 
        cat: document.getElementById('f-k').value, 
        drain: document.getElementById('f-d').value, 
        days: days,
        done: id ? (this.db.find(t => t.id == id)?.done || false) : false,
        ignored: id ? (this.db.find(t => t.id == id)?.ignored || false) : false
    };

    if(id) {
        this.db = this.db.map(t => t.id == id ? taskData : t);
    } else {
        this.db.push(taskData);
    }
    
    this.db.sort((a,b) => a.start.localeCompare(b.start));
    this.sync();
    UI.resetForm();
    UI.tab('h');
},
    toggle(id) {
        this.db = this.db.map(t => t.id === id ? {...t, done: !t.done, ignored: false} : t);
        this.sync();
    },

    remove(id) {
        if(confirm("Remover tarefa?")) {
            this.db = this.db.filter(t => t.id !== id);
            this.sync();
        }
    },

    rescheduleAll() {
        this.db = this.db.map(t => {
            if(!t.done && !t.ignored) {
                const [h, m] = t.start.split(':').map(Number);
                const d = new Date(); 
                d.setHours(h, m + 15);
                t.start = d.toTimeString().slice(0,5);
            }
            return t;
        });
        this.sync();
    },

    skip() {
        const now = new Date().toTimeString().slice(0,5);
        const today = new Date().getDay();
        const task = this.db.find(t => t.days.includes(today) && !t.done && !t.ignored && t.start < now);
        
        if(task) {
            this.db = this.db.map(t => t.id === task.id ? {...t, ignored: true} : t);
            this.sync();
        }
    },

    setDailyEnergy(val) {
        localStorage.setItem('ri_energy_today', val);
        document.getElementById('energyModal').style.display = 'none';
    },

    loop() {
        const box = document.getElementById('delayBox'), 
              taskSpan = document.getElementById('delayTask');
        const now = new Date().toTimeString().slice(0,5);
        const today = new Date().getDay();

        const d = this.db.find(t => t.days && t.days.includes(today) && !t.done && !t.ignored && t.start < now);
        
        if(box) {
            box.style.display = d ? 'block' : 'none';
            if(d) taskSpan.innerText = d.name;
        }
        setTimeout(() => this.loop(), 30000);
    }
};

const UI = {
    charts: {},

    tab(t) {
        ['h','c','a'].forEach(v => {
            const view = document.getElementById('v-'+v);
            const tab = document.getElementById('t-'+v);
            if(view) view.style.display = v === t ? 'block' : 'none';
            if(tab) tab.classList.toggle('active', v === t);
        });
        
        if(t === 'a') {
            // Aumentamos levemente o delay para garantir que a aba esteja visível
            setTimeout(() => this.renderAnalytics(), 150);
        }
        if(t !== 'c') this.resetForm();
        this.render();
    },

    maskTime(i) {
        let v = i.value.replace(/\D/g, ''); 
        if (v.length > 2) v = v.substring(0,2) + ':' + v.substring(2,4);
        i.value = v;
    },

    render() {
        const l = document.getElementById('taskList');
        if(!l) return;
        const today = new Date().getDay();
        const tasksToday = API.db.filter(t => t.days && t.days.includes(today));
        
        if (tasksToday.length === 0) {
            l.innerHTML = '<p style="text-align:center; color:var(--mt); margin-top:20px">Nada planejado para hoje!</p>';
        } else {
            l.innerHTML = tasksToday.map(t => `
                <div class="task ${t.done ? 'done' : ''} ${t.ignored ? 'ignored' : ''} drain-${t.drain}">
                    <div class="check ${t.done ? 'checked' : ''}" onclick="event.stopPropagation(); API.toggle(${t.id})"></div>
                    <div style="flex:1" onclick="UI.edit(${t.id})">
                        <strong style="display:block">${t.name} ${t.ignored ? '<small style="opacity:0.6"> (Pulada)</small>' : ''}</strong>
                        <small style="color:var(--mt)">${t.start} — ${t.end} | ${t.cat}</small>
                    </div>
                    <button style="background:none; border:none; color:var(--d); cursor:pointer; font-size:1.2rem" onclick="event.stopPropagation(); API.remove(${t.id})">×</button>
                </div>
            `).join('');
        }
        
        const done = tasksToday.filter(t => t.done).length;
        const p = tasksToday.length ? Math.round((done/tasksToday.length)*100) : 0;
        const bar = document.getElementById('p-bar');
        const txt = document.getElementById('p-txt');
        if(bar) bar.style.width = p+'%';
        if(txt) txt.innerText = p+'%';
    },

    edit(id) {
        const t = API.db.find(task => task.id === id);
        if(!t) return;
        this.tab('c');
        document.getElementById('form-title').innerText = "Editar Hábito";
        document.getElementById('f-id').value = t.id;
        document.getElementById('f-n').value = t.name;
        document.getElementById('f-s').value = t.start;
        document.getElementById('f-e').value = t.end;
        document.getElementById('f-k').value = t.cat;
        document.getElementById('f-d').value = t.drain;
        document.querySelectorAll('#f-days .day-btn').forEach(btn => {
            btn.classList.toggle('active', t.days.includes(parseInt(btn.dataset.day)));
        });
        document.getElementById('btn-main').innerText = "Salvar Alterações";
        document.getElementById('btn-cancel').style.display = "block";
    },

    resetForm() {
        const fId = document.getElementById('f-id');
        if(!fId) return;
        document.getElementById('form-title').innerText = "Novo Hábito";
        fId.value = "";
        document.getElementById('f-n').value = "";
        document.getElementById('f-s').value = "";
        document.getElementById('f-e').value = "";
        document.getElementById('btn-main').innerText = "Adicionar ao Plano";
        document.getElementById('btn-cancel').style.display = "none";
        document.querySelectorAll('#f-days .day-btn').forEach(b => b.classList.add('active'));
    },

    renderAnalytics() {
        const cats = ['Trabalho', 'Saúde', 'Lazer', 'Essencial'];
        
        // Função interna para calcular minutos totais com segurança
        const getMinutes = (time) => {
            if(!time || !time.includes(':')) return 0;
            const [h, m] = time.split(':').map(Number);
            return (h * 60) + m;
        };

        const data = cats.map(c => 
            API.db.filter(t => t.cat === c)
                  .reduce((acc, task) => acc + Math.max(0, getMinutes(task.end) - getMinutes(task.start)), 0)
        );
        
        const colors = ['#6366f1', '#10b981', '#f59e0b', '#8b5cf6'];
        const ctxP = document.getElementById('c-p');
        const ctxB = document.getElementById('c-b');
        
        // Destruição segura para evitar conflitos de Canvas
        if(this.charts.p) { this.charts.p.destroy(); this.charts.p = null; }
        if(this.charts.b) { this.charts.b.destroy(); this.charts.b = null; }

        // Só renderiza se houver algum tempo registrado
        const hasData = data.some(v => v > 0);

        if(ctxP && hasData) {
            this.charts.p = new Chart(ctxP, { 
                type: 'doughnut', 
                data: { labels: cats, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] }, 
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff', padding: 20 } } } } 
            });
        }
        
        if(ctxB) {
            this.charts.b = new Chart(ctxB, { 
                type: 'bar', 
                data: { labels: cats, datasets: [{ label: 'Minutos', data, backgroundColor: colors, borderRadius: 8 }] }, 
                options: { 
                    maintainAspectRatio: false, 
                    scales: { 
                        y: { beginAtZero: true, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                        x: { ticks: { color: '#94a3b8' }, grid: { display: false } } 
                    },
                    plugins: { legend: { display: false } }
                } 
            });
        }
    }

}; 

window.addEventListener('DOMContentLoaded', () => API.init());
</script>
</body>
</html>
