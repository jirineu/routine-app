<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RoutineAI Pro Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --p: #6366f1; --s: #10b981; --w: #f59e0b; --d: #ef4444;
            --bg: #0f172a; --c: #1e293b; --t: #f8fafc; --mt: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 20px; display: flex; justify-content: center; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .app { width: 100%; max-width: 480px; display: none; animation: slideIn 0.4s ease; }
        #auth-screen { width: 100%; max-width: 400px; text-align: center; margin-top: 5vh; }
        
        .card { background: var(--c); padding: 25px; border-radius: 24px; margin-bottom: 15px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); }
        .alert { background: rgba(239, 68, 68, 0.15); border-left: 6px solid var(--d); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: none; animation: slideIn 0.3s ease; }
        
        input, select { padding: 16px; border-radius: 12px; border: 2px solid #334155; background: #0f172a; color: white; width: 100%; margin-bottom: 12px; font-size: 1rem; }
        .btn { padding: 14px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-p { background: var(--p); color: white; width: 100%; }
        .btn-act { padding: 8px 16px; margin: 8px 8px 0 0; }

        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: var(--c); padding: 6px; border-radius: 16px; position: sticky; top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px; border-radius: 12px; background: none; color: var(--mt); border: none; cursor: pointer; font-weight: 700; }
        .tab.active { background: var(--p); color: white; }

        .task { display: flex; align-items: center; gap: 15px; padding: 16px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.02); transition: 0.3s; }
        .task.done { opacity: 0.4; transform: scale(0.98); }
        .task.drain-high { border-right: 4px solid var(--d); }
        .task.drain-med { border-right: 4px solid var(--w); }
        .task.drain-low { border-right: 4px solid var(--s); }

        .check { width: 28px; height: 28px; border: 2.5px solid var(--p); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .check.checked { background: var(--s); border-color: var(--s); }
        .check.checked::after { content: '✓'; color: white; font-weight: bold; }

        .prog-bg { background: #334155; height: 12px; border-radius: 6px; flex: 1; overflow: hidden; margin: 10px 0; }
        .prog-fill { height: 100%; background: var(--s); width: 0%; transition: 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        
        #energyModal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(2, 6, 23, 0.95); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .energy-option { padding: 20px; border-radius: 15px; background: var(--c); text-align: center; cursor: pointer; border: 2px solid transparent; }
    
    
    
    
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="card">
        <h2>RoutineAI Pro Sync ☁️</h2>
        <input type="email" id="u-email" placeholder="E-mail">
        <input type="password" id="u-token" placeholder="GitHub Token (PAT)">
        <button class="btn btn-p" onclick="Cloud.login()">Entrar e Sincronizar</button>
    </div>
</div>

<div id="energyModal">
    <div class="card" style="text-align:center; width:100%">
        <h2>Bom dia! ⚡</h2>
        <p>Como está sua bateria hoje?</p>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:20px">
            <div class="energy-option" onclick="API.setDailyEnergy(1)">🔋<br>Baixa</div>
            <div class="energy-option" onclick="API.setDailyEnergy(3)">⚡<br>Média</div>
            <div class="energy-option" onclick="API.setDailyEnergy(5)">🔥<br>Alta</div>
        </div>
    </div>
</div>

<div class="app" id="main-app">
  <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
    <button class="btn" style="background: rgba(255,255,255,0.1); color: var(--mt); padding: 5px 12px; font-size: 0.75rem;" onclick="Cloud.logout()">Sair da Conta</button>
</div>
    <div id="delayBox" class="alert">
        <span style="display:block; font-weight:700;">🚀 Hora de agir: <span id="delayTask"></span></span>
        <button class="btn btn-act" style="background:var(--p); color:white" onclick="API.rescheduleAll()">Adiar 15min</button>
        <button class="btn btn-act" style="background:var(--w); color:white" onclick="API.skip()">Pular esta</button>
    </div>

    <div class="tabs">
        <button id="t-h" class="tab active" onclick="UI.tab('h')">Hoje</button>
        <button id="t-c" class="tab" onclick="UI.tab('c')">Plano</button>
        <button id="t-a" class="tab" onclick="UI.tab('a')">Analytics</button>
    </div>

    <div id="v-h">
        <div class="card">
            <div style="display:flex; justify-content:space-between; font-weight:800; font-size:0.8rem; color:var(--mt)">
                <span>PROGRESSO</span><span id="p-txt">0%</span>
            </div>
            <div class="prog-bg"><div id="p-bar" class="prog-fill"></div></div>
        </div>
        <div id="taskList"></div>
    </div>

<div id="v-c" style="display:none">
    <div class="card">
        <h3 id="form-title" style="margin-top:0">Novo/Editar Hábito</h3>
        <input type="hidden" id="f-id"> 
        
        <input type="text" id="f-n" placeholder="Atividade...">
        
        <div style="display:flex; gap:10px">
            <input type="text" id="f-s" placeholder="Início (08:00)" maxlength="5" oninput="UI.maskTime(this)"> 
            <input type="text" id="f-e" placeholder="Fim (09:00)" maxlength="5" oninput="UI.maskTime(this)">
        </div>

       <div style="display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: nowrap; width: 100%;" id="day-selector">
    <style>
        .day-btn { 
            flex: 1; 
            padding: 8px 0; 
            border-radius: 8px; 
            background: #334155; 
            border: none; 
            color: white; 
            cursor: pointer; 
            font-size: 0.65rem; 
            font-weight: bold; 
            min-width: 0; /* Remove os 45px que causavam a quebra */
            text-align: center;
        }
        .day-btn.active { background: var(--s); }
    </style>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="0">Dom</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="1">Seg</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="2">Ter</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="3">Qua</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="4">Qui</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="5">Sex</button>
    <button type="button" class="day-btn" onclick="this.classList.toggle('active')" data-day="6">Sáb</button>
</div>

        <select id="f-k">
            <option value="Trabalho">💻 Trabalho</option>
            <option value="Saúde">💪 Saúde</option>
            <option value="Lazer">🎮 Lazer</option>
            <option value="Essencial">☕ Essencial</option>
        </select>
        <select id="f-d">
            <option value="low">🍃 Baixa</option>
            <option value="med" selected>⚡ Média</option>
            <option value="high">🔥 Alta</option>
        </select>
        
        <div style="display:flex; gap:10px">
            <button class="btn btn-p" onclick="API.add()">Salvar Atividade</button>
            <button id="btn-cancel" class="btn" style="background:#475569; color:white; display:none; flex:1" onclick="UI.clearForm()">Cancelar</button>
        </div>
    </div>
</div>

    <div id="v-a" style="display:none">
        <div id="balanceAlert" class="alert" style="background:rgba(245,158,11,0.1); border-color:var(--w); color:var(--w); font-size:0.9rem"></div>
        <div class="card">
            <h4 style="margin:0">Onde está seu tempo? (Min)</h4>
            <div style="height:220px"><canvas id="c-p"></canvas></div>
        </div>
        <div class="card">
            <h4 style="margin:0">Carga por Categoria</h4>
            <div style="height:220px"><canvas id="c-b"></canvas></div>
        </div>
    </div>
</div>

<script>
const Cloud = {
    owner: "jirineu",
    cred: JSON.parse(localStorage.getItem('ri_auth')),
    
    logout() {
        if(confirm("Deseja realmente sair? Deve se Lembrar do E-mail e Token para entrar novamente.")) {
            localStorage.clear();
            location.reload();
        }
    },
    async login() {
        const email = document.getElementById('u-email').value.trim();
        const token = document.getElementById('u-token').value.trim();
        
        if(!email || !token) return alert('E-mail e Token são obrigatórios!');
        
        localStorage.clear();
        if(typeof API !== 'undefined') API.db = [];
        
        this.cred = { 
            user: this.owner, 
            token: token, 
            file: `data_${btoa(email).substring(0,8)}.json` 
        };
        
        localStorage.setItem('ri_auth', JSON.stringify(this.cred));
        
        // Verificação simples: tenta ler o repositório. Se falhar, o Token é inválido.
        try {
            const res = await fetch(`https://api.github.com/repos/${this.owner}/routine-db`, {
                headers: { 'Authorization': `token ${token}` }
            });
            if(res.ok || res.status === 404) { 
                // status 404 aqui é aceitável pois o arquivo pode não existir ainda
                location.reload(); 
            } else {
                alert("Token inválido ou sem acesso ao repositório.");
            }
        } catch(e) {
            alert("Erro de conexão com o GitHub.");
        }
    },

    async request(method, body = null) {
        if(!this.cred) return method === 'GET' ? [] : null;
        const url = `https://api.github.com/repos/${this.cred.user}/routine-db/contents/${this.cred.file}`;
        const headers = { 
            'Authorization': `token ${this.cred.token}`, 
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };

        try {
            const res = await fetch(url, { headers });
            let currentSha = null;
            
            if (res.ok) {
                const data = await res.json();
                currentSha = data.sha;
                if (method === 'GET') {
                    return JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } else if (res.status === 404 && method === 'GET') {
                return []; 
            }

            if (method === 'PUT' && body) {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(body))));
                const putData = { message: 'Sync RoutineAI', content };
                if (currentSha) putData.sha = currentSha;

                const putRes = await fetch(url, { method: 'PUT', headers, body: JSON.stringify(putData) });
                if (putRes.ok) console.log("☁️ Sincronizado");
                else if (putRes.status === 403) console.error("Erro 403: Verifique as permissões do Token (Escopo 'repo').");
            }
        } catch(e) { }
        return method === 'GET' ? [] : null;
    }
};
const API = {
    db: JSON.parse(localStorage.getItem('ri_pro_db') || '[]'),

    async init() {
        if(!Cloud.cred) return;
        const checkDOM = setInterval(() => {
            if(document.getElementById('main-app')) {
                clearInterval(checkDOM);
                this.setupApp();
            }
        }, 100);
    },

   async setupApp() {
        // --- ADICIONE ESTA TRAVA DE DATA AQUI ---
        const lastDate = localStorage.getItem('ri_last_date');
        const todayDate = new Date().toDateString();

        if(lastDate !== todayDate) {
            localStorage.removeItem('ri_energy_today'); // Força perguntar a energia de novo
            localStorage.setItem('ri_last_date', todayDate);
            // Desmarca as tarefas para o novo dia
            this.db = this.db.map(t => ({ ...t, done: false }));
        }
        // ---------------------------------------

        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        UI.render();
        
        const remote = await Cloud.request('GET');
        if (remote && Array.isArray(remote)) {
            this.db = remote;
            localStorage.setItem('ri_pro_db', JSON.stringify(this.db));
            UI.render();
        }
        
        if(!localStorage.getItem('ri_energy_today')) {
            const modal = document.getElementById('energyModal');
            if(modal) modal.style.display = 'flex';
        }
        this.loop();
    },
    async sync() {
        localStorage.setItem('ri_pro_db', JSON.stringify(this.db));
        UI.render();
        await Cloud.request('PUT', this.db);
    },

add() {
        const id = document.getElementById('f-id').value;
        const n = document.getElementById('f-n').value, 
              s = document.getElementById('f-s').value, 
              e = document.getElementById('f-e').value;
        
        const timeRegex = /^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$/;
        const days = Array.from(document.querySelectorAll('.day-btn.active')).map(b => parseInt(b.dataset.day));

        if(!n || !s || !e) return alert("Preencha Nome e Horários!");
        if(!timeRegex.test(s) || !timeRegex.test(e)) return alert("Horário inválido! Use o formato 00:00");
        if(days.length === 0) return alert("Selecione pelo menos um dia da semana!");

        const taskData = {
            name: n, start: s, end: e,
            cat: document.getElementById('f-k').value,
            drain: document.getElementById('f-d').value,
            days: days,
            done: false
        };

        if(id) {
            this.db = this.db.map(t => t.id == id ? { ...t, ...taskData, id: parseInt(id) } : t);
        } else {
            taskData.id = Date.now();
            this.db.push(taskData);
        }

        this.db.sort((a,b) => a.start.localeCompare(b.start));
        this.sync();
        UI.clearForm();
        UI.tab('h');
    },
   toggle(id) {
        this.db = this.db.map(t => t.id === id ? {...t, done: !t.done, skipped: false} : t);
        this.sync();
    },

    remove(id) {
        if(confirm("Remover tarefa?")) {
            this.db = this.db.filter(t => t.id !== id);
            this.sync();
        }
    },

  rescheduleAll() {
        const now = new Date();
        const currentTime = now.toTimeString().slice(0,5);
        
        // 1. Encontra a tarefa que deveria estar acontecendo agora e não foi feita
        const taskToShorten = this.db.find(t => !t.done && t.start < currentTime);
        
        if(taskToShorten) {
            const [h, m] = taskToShorten.start.split(':').map(Number);
            const d = new Date(); 
            d.setHours(h, m + 15);
            
            const newStart = d.toTimeString().slice(0,5);

            // 2. Só adia se o novo início não ultrapassar o fim da própria tarefa
            if (newStart < taskToShorten.end) {
                taskToShorten.start = newStart;
                this.sync();
            } else {
                alert("Não há mais tempo para adiar. Melhor pular ou concluir!");
            }
        }
    },

skip() {
        const now = new Date().toTimeString().slice(0,5);
        
        // Encontra a tarefa que:
        // 1. Não está pronta (!t.done)
        // 2. Ainda não foi pulada (!t.skipped)
        // 3. O horário de início já passou (t.start < now)
        const task = this.db.find(t => !t.done && !t.skipped && t.start < now);
        
        if(task) {
            this.db = this.db.map(t => 
                t.id === task.id ? {...t, skipped: true} : t
            );
            
            // Fecha o alerta imediatamente após pular
            const box = document.getElementById('delayBox');
            if(box) box.style.display = 'none';
            
            this.sync();
        }
    },

  setDailyEnergy(val) {
        localStorage.setItem('ri_energy_today', val);
        document.getElementById('energyModal').style.display = 'none';
        this.sync(); // Usa o sync para salvar o reset das tarefas na nuvem também
    },
   loop() {
        const box = document.getElementById('delayBox'), 
              taskSpan = document.getElementById('delayTask');
        
        const now = new Date();
        const currentTime = now.toTimeString().slice(0,5);
        const today = now.getDay();

        // 1. Filtra tarefas de hoje que não foram feitas nem puladas
        const activeTasks = this.db
            .filter(t => t.days && t.days.includes(today) && !t.done && !t.skipped)
            .sort((a, b) => a.start.localeCompare(b.start));

        // 2. Encontra a tarefa que já deveria ter começado
        const current = activeTasks.find(t => t.start <= currentTime);

        if (current) {
            // --- LÓGICA DOS 5 MINUTOS ---
            const [h, m] = current.start.split(':').map(Number);
            const startTime = new Date();
            startTime.setHours(h, m + 5); // Adiciona a tolerância de 5 min
            const toleranceTime = startTime.toTimeString().slice(0,5);
            
            // Verifica se há uma próxima tarefa para a regra do "encosto"
            const next = activeTasks.find(t => t.start > current.start);

            // O Alerta aparece se:
            // Passou da tolerância de 5 min OU atingiu o fim da tarefa OU encostou na próxima
            const shouldAlert = currentTime >= toleranceTime || 
                                currentTime >= current.end || 
                                (next && currentTime >= next.start);

            if (shouldAlert) {
                if(box) {
                    box.style.display = 'block';
                    taskSpan.innerText = current.name;
                }
            } else {
                if(box) box.style.display = 'none';
            }
        } else {
            if(box) box.style.display = 'none';
        }
        
        setTimeout(() => this.loop(), 30000);
    },
};

const UI = {
    charts: {},
    
    tab(t) {
        ['h','c','a'].forEach(v => {
            const view = document.getElementById('v-'+v);
            const tab = document.getElementById('t-'+v);
            if(view) view.style.display = v === t ? 'block' : 'none';
            if(tab) tab.classList.toggle('active', v === t);
        });
        this.render(); // Garante que a lista atualize ao trocar de aba
        if(t === 'a') setTimeout(() => this.renderAnalytics(), 100);
    },

render() {
    const l = document.getElementById('taskList');
    if(!l) return;
    
    const today = new Date().getDay();
    const energy = parseInt(localStorage.getItem('ri_energy_today') || '3');

    const tasksToShow = API.db.filter(t => {
        const isForToday = (!t.days || t.days.length === 0 || t.days.includes(today));
        if(!isForToday) return false;
        if(energy === 1 && t.drain === 'high') return false;
        return true;
    });

    l.innerHTML = tasksToShow.map(t => `
        <div class="task ${(t.done || t.skipped) ? 'done' : ''} drain-${t.drain}">
            <div class="check ${t.done ? 'checked' : ''}" 
                 onclick="${t.skipped ? '' : `event.stopPropagation(); API.toggle(${t.id})`}">
            </div>
            
            <div style="flex:1; cursor:pointer" onclick="UI.edit(${t.id})">
                <strong style="display:block">${t.name} ${t.skipped ? '(Pulada)' : ''}</strong>
                <small style="color:var(--mt)">${t.start} — ${t.end} | ${t.cat}</small>
            </div>
            
            <button style="background:none; border:none; color:var(--d); cursor:pointer; font-size:1.2rem" 
                    onclick="event.stopPropagation(); API.remove(${t.id})">×</button>
        </div>
    `).join('');
    
    // CALCULO DE PORCENTAGEM: Filtra para ignorar as puladas
    const validForProgress = tasksToShow.filter(t => !t.skipped);
    const doneCount = validForProgress.filter(t => t.done).length;
    const p = validForProgress.length ? Math.round((doneCount / validForProgress.length) * 100) : 0;
    
    const bar = document.getElementById('p-bar');
    const txt = document.getElementById('p-txt');
    if(bar) bar.style.width = p + '%';
    if(txt) txt.innerText = p + '%';
},
    maskTime(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length >= 2) v = v.substring(0, 2) + ':' + v.substring(2, 4);
        input.value = v;
    },

edit(id) {
        const t = API.db.find(x => x.id === id);
        if(!t) return;

        this.tab('c'); 
        document.getElementById('f-id').value = t.id;
        document.getElementById('f-n').value = t.name;
        document.getElementById('f-s').value = t.start;
        document.getElementById('f-e').value = t.end;
        document.getElementById('f-k').value = t.cat;
        document.getElementById('f-d').value = t.drain;
        document.getElementById('form-title').innerText = "Editar Atividade";
        document.getElementById('btn-cancel').style.display = "block";

        document.querySelectorAll('.day-btn').forEach(b => {
            b.classList.toggle('active', t.days && t.days.includes(parseInt(b.dataset.day)));
        });
    },

    clearForm() {
        document.getElementById('f-id').value = '';
        document.getElementById('f-n').value = '';
        document.getElementById('f-s').value = '';
        document.getElementById('f-e').value = '';
        document.getElementById('form-title').innerText = "Novo Hábito";
        document.getElementById('btn-cancel').style.display = "none";
        document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    },

renderAnalytics() {
    const cats = ['Trabalho', 'Saúde', 'Lazer', 'Essencial'];
    const getD = (s, e) => {
        const [h1, m1] = s.split(':').map(Number), [h2, m2] = e.split(':').map(Number);
        return Math.max(0, (h2 * 60 + m2) - (h1 * 60 + m1));
    };

    // FILTRO: Ignora as tarefas que foram "puladas" nos cálculos dos gráficos
    const dbAtivo = API.db.filter(t => !t.skipped);

    // Agora o 'data' usa o 'dbAtivo' em vez do 'API.db'
    const data = cats.map(c => dbAtivo.filter(t => t.cat === c).reduce((a, b) => a + getD(b.start, b.end), 0));
    
    const colors = ['#6366f1', '#10b981', '#f59e0b', '#8b5cf6'];
    
    const canvasP = document.getElementById('c-p');
    const canvasB = document.getElementById('c-b');
    
    if(canvasP) {
        if(this.charts.p) this.charts.p.destroy();
        this.charts.p = new Chart(canvasP, { 
            type: 'doughnut', 
            data: { labels: cats, datasets: [{ data, backgroundColor: colors, borderWidth: 0 }] }, 
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } } 
        });
    }
    
    if(canvasB) {
        if(this.charts.b) this.charts.b.destroy();
        this.charts.b = new Chart(canvasB, { 
            type: 'bar', 
            data: { labels: cats, datasets: [{ label: 'Minutos', data, backgroundColor: colors, borderRadius: 8 }] }, 
            options: { maintainAspectRatio: false, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } } 
        });
    }
},
};
window.addEventListener('DOMContentLoaded', () => API.init());
</script>
